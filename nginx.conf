# ── Servidor principal ────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl;                         # activar em produção
    server_name localhost;                    # substituir pelo domínio em produção

    # SSL — descomenta e substitui o caminho quando tiveres o certificado
    # ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO.pt/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.pt/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # ── API FastAPI ──────────────────────────────────────────────────────────
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://api:8000;
        proxy_pass         $backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Health check da API (sem prefixo /api/) ──────────────────────────────
    location = /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }

    # ── Frontend React (SPA) ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
