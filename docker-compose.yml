# ─── docker-compose.yml — Produção (EasyPanel) ───────────────────────────────
#
# Arquitectura:
#   Traefik (EasyPanel) → nginx:80 → { /api/* → api:8000
#                                     /       → frontend:80 }
#
# Variáveis de ambiente — configurar na aba "Ambiente" do EasyPanel:
#
#   Runtime (backend):
#     SUPABASE_URL          URL do projecto Supabase
#     SUPABASE_SERVICE_KEY  service_role key (NUNCA expor no frontend)
#     ANTHROPIC_API_KEY     chave Anthropic
#     WAHA_URL              URL do WAHA na VPS
#     WAHA_API_KEY          API key do WAHA
#     ENCRYPTION_KEY        chave Fernet (gerar: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
#     BACKEND_WEBHOOK_URL   URL pública do backend (ex: https://api.seudominio.com)
#
#   Build-time frontend — também na aba "Ambiente" do EasyPanel
#   (o Compose substitui ${VAR} antes do build):
#     VITE_SUPABASE_URL     mesmo valor que SUPABASE_URL
#     VITE_SUPABASE_ANON_KEY  chave anon/public (≠ service_role)
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: clinicflowz_api
    restart: unless-stopped
    # env_file removido — EasyPanel injeta variáveis de ambiente directamente.
    # Configure tudo na aba "Ambiente" do EasyPanel (nunca commitar .env).
    expose:
      - "8000"
    healthcheck:
      # python:3.12-slim não tem curl — urllib é stdlib Python.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend React (build + nginx interno serve) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ${VAR} é substituído pelo Compose usando as variáveis da aba "Ambiente".
        # No EasyPanel: definir VITE_SUPABASE_URL e VITE_SUPABASE_ANON_KEY
        # na aba "Ambiente" para que o build do Vite as inclua no bundle.
        VITE_SUPABASE_URL:      ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        # Vazio → frontend usa URLs relativas (/api/...) → nginx roteia para api.
        # NÃO mudar para URL absoluta — o nginx deste compose já faz o proxy.
        VITE_API_URL:           ""
    container_name: clinicflowz_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy

  # ── Reverse proxy nginx (entrada única para o EasyPanel/Traefik) ─────────────
  # O Traefik do EasyPanel termina o SSL e encaminha HTTP para nginx:80.
  # nginx roteia internamente: /api/* → api:8000 | / → frontend:80.
  # SEM "ports:" — nenhuma porta é exposta directamente no host.
  # O EasyPanel expõe este serviço via domínio configurado na sua UI.
  nginx:
    image: nginx:1.27-alpine
    container_name: clinicflowz_nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      # nginx.conf está commitado no repo — sem :ro para evitar o erro
      # do script IPv6 do nginx:alpine ("cannot modify read-only file").
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      # /etc/letsencrypt REMOVIDO — Traefik/EasyPanel gerencia SSL.
    depends_on:
      - api
      - frontend
