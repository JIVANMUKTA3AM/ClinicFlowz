# ─── docker-compose.yml — Produção (EasyPanel + Traefik) ─────────────────────
#
# Arquitectura (2 serviços):
#   Traefik (EasyPanel) → frontend:80 ─┬─ /api/* → api:8000 (proxy interno nginx)
#                                       └─ /      → React SPA (ficheiros estáticos)
#
# O EasyPanel expõe o serviço "frontend" no domínio configurado.
# O Traefik termina SSL. O nginx interno do frontend roteia /api/ para o api.
# Sem serviço nginx separado. Sem bind de portas no host.
#
# ─── VARIÁVEIS — aba "Ambiente" do EasyPanel ─────────────────────────────────
#
#   Runtime (backend — injectadas directamente nos containers):
#     SUPABASE_URL            URL do projecto Supabase
#     SUPABASE_SERVICE_KEY    service_role key (NUNCA expor no frontend)
#     ANTHROPIC_API_KEY       chave Anthropic
#     WAHA_URL                URL do WAHA
#     WAHA_API_KEY            API key do WAHA
#     ENCRYPTION_KEY          chave Fernet
#     BACKEND_WEBHOOK_URL     URL pública deste serviço (ex: https://app.dominio.com)
#
#   Build-time frontend (Vite lê em build e injeta no bundle JS):
#     VITE_SUPABASE_URL       mesmo valor que SUPABASE_URL
#     VITE_SUPABASE_ANON_KEY  chave anon/public (≠ service_role!)
#
#   O Compose substitui ${VAR} com os valores do Ambiente antes do build,
#   passando-os como --build-arg para o Dockerfile do frontend.
#   NÃO é necessária configuração extra de build args no EasyPanel.
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis — debounce buffer WhatsApp ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clinicflowz_redis
    restart: unless-stopped
    expose:
      - "6379"

  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: clinicflowz_api
    restart: unless-stopped
    # Sem env_file — EasyPanel injeta todas as variáveis da aba "Ambiente".
    environment:
      REDIS_URL: redis://redis:6379   # serviço interno; não exposto ao exterior
    expose:
      - "8000"
    healthcheck:
      # python:3.12-slim não tem curl; urllib é stdlib — funciona sempre.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend React + nginx (entrada única exposta pelo Traefik) ──────────────
  # Este serviço faz DOIS trabalhos:
  #   1. Serve os ficheiros estáticos do React (/)
  #   2. Proxia /api/* para api:8000 (via nginx interno — ver nginx-spa.conf)
  #
  # É o ÚNICO serviço a expor no domínio do EasyPanel (porta 80).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Substituídos pelo Compose com os valores da aba "Ambiente" do EasyPanel.
        VITE_SUPABASE_URL:      ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        # Vazio → o bundle usa URLs relativas (/api/...) → nginx faz o proxy.
        VITE_API_URL:           ""
    container_name: clinicflowz_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      redis:
        condition: service_started
      api:
        condition: service_healthy
