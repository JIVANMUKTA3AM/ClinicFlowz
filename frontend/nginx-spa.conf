server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    # ── Proxy /api/ → backend FastAPI ────────────────────────────────────────
    # O frontend nginx faz o proxy para o api:8000 internamente na rede Docker.
    # O Traefik (EasyPanel) só precisa de rotear para este serviço (porta 80).
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Health check (sem prefixo /api/) ────────────────────────────────────
    location = /health {
        proxy_pass http://api:8000;
        access_log off;
    }

    # ── SPA: React Router — devolve index.html para rotas desconhecidas ─────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets estáticos com cache longo ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
